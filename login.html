<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atividade</title>

  <style>
    body {
      background-color: dimgrey;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background-color: #2f2f2f;
      padding: 25px 30px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
      color: #fff;
    }

    h3 {
      margin-bottom: 5px;
      margin-top: 15px;
      font-size: 16px;
    }

    input {
      width: 100%;
      padding: 8px;
      border-radius: 5px;
      border: none;
      outline: none;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #4caf50;
      border: none;
      border-radius: 5px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background-color: #43a047;
    }
  </style>
</head>

<body>
  <div class="container">
    <h3>Nome</h3>
    <input type="text" name="nome" id="nome" placeholder="Digite seu nome" />

    <h3>Número do cartão</h3>
    <input type="number" name="cartao" id="cartao" placeholder="Digite o número" />

    <h3>Idade</h3>
    <input type="number" name="idade" id="idade" placeholder="Digite sua idade" />

    <a
      href="https://www.youtube.com/watch?v=_qWd8YWMhbU&t=1s"
      target="_blank"
    >
      <button>Ir para o site</button>
    </a>
  </div>
</body>
</html>
